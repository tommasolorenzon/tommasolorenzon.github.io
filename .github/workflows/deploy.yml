name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          git clone "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" .
          git checkout "${{ github.sha }}"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages branch
        run: |
          npx gh-pages -d dist \
            -r "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" \
            -u "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
